<script>
const tabs = [
  {id:'op',     label:'Operador'},
  {id:'mc',     label:'MissionCtrl'},
  {id:'hitl',   label:'HITL gate'},
  {id:'recon',  label:'ReconAgent'},
  {id:'scan',   label:'ScanAgent'},
  {id:'analysis',label:'AnalysisAgent'},
  {id:'reporter',label:'ReporterAgent'},
  {id:'mcp-layer',label:'MCP'},
  {id:'lab',    label:'Lab targets'},
  {id:'m1',     label:'Métricas'},
];

const container = document.getElementById('tabs');
const svg = document.getElementById('diag');
const tip = document.getElementById('tooltip');

tabs.forEach(t => {
  const b = document.createElement('button');
  b.className = 'ptab';
  b.textContent = t.label;
  b.onclick = () => {
    document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const el = document.getElementById(t.id);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  };
  container.appendChild(b);
});

document.querySelectorAll('[data-tip]').forEach(el => {
  el.style.cursor = 'pointer';
  el.addEventListener('mouseenter', e => {
    tip.style.display = 'block';
    tip.innerHTML = '<b>' + (el.querySelector('text')?.textContent||'') + '</b><s2>' + el.dataset.tip + '</s2>';
  });
  el.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top  = (e.clientY - 8) + 'px';
  });
  el.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
});
</script>
